<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloqueios Regionais - TV Sabinos</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .blocks-page {
      max-width: 980px;
      margin: 40px auto;
      padding: 0 20px 40px;
    }

    .blocks-header {
      margin-bottom: 20px;
    }

    .blocks-header h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }

    .blocks-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .blocks-form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .blocks-form .full {
      grid-column: 1 / -1;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 0.9rem;
      color: #d9dde4;
    }

    .field input,
    .field textarea {
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 10px;
      color: #fff;
      padding: 10px 12px;
      font: inherit;
      width: 100%;
    }

    .field textarea {
      min-height: 90px;
      resize: vertical;
    }

    .btn-primary {
      appearance: none;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      background: #ffca28;
      color: #1a1a1a;
    }

    .blocks-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    .blocks-table th,
    .blocks-table td {
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      padding: 10px 8px;
      vertical-align: top;
      text-align: left;
    }

    .btn-danger {
      appearance: none;
      border: 1px solid rgba(255, 72, 72, 0.5);
      border-radius: 8px;
      padding: 6px 10px;
      background: rgba(255, 72, 72, 0.16);
      color: #ffd7d7;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .muted {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.86rem;
    }

    .empty-state {
      padding: 14px;
      border: 1px dashed rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      color: rgba(255, 255, 255, 0.85);
    }

    @media (max-width: 780px) {
      .blocks-form {
        grid-template-columns: 1fr;
      }

      .blocks-table th:nth-child(3),
      .blocks-table td:nth-child(3) {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="blocks-page">
    <header class="blocks-header">
      <h1>Bloqueios Regionais de Atrações</h1>
      <p class="muted">Defina regras para impedir a transmissão conforme país, estado e cidade da audiência.</p>
    </header>

    <section class="blocks-card">
      <form id="block-form" class="blocks-form">
        <div class="field full">
          <label for="attraction">Atração (trecho do título no EPG)</label>
          <input id="attraction" name="attraction" type="text" required placeholder="Ex.: Campeonato" />
        </div>

        <div class="field">
          <label for="countries">Países (separados por vírgula)</label>
          <input id="countries" name="countries" type="text" placeholder="Ex.: brasil, argentina" />
        </div>

        <div class="field">
          <label for="states">Estados (separados por vírgula)</label>
          <input id="states" name="states" type="text" placeholder="Ex.: sao paulo, rio de janeiro" />
        </div>

        <div class="field full">
          <label for="cities">Cidades (separadas por vírgula)</label>
          <input id="cities" name="cities" type="text" placeholder="Ex.: campinas, sorocaba" />
        </div>

        <div class="field full">
          <label for="reason">Motivo (opcional)</label>
          <textarea id="reason" name="reason" placeholder="Ex.: restrição de direitos de transmissão"></textarea>
        </div>

        <div class="full">
          <button class="btn-primary" type="submit">Salvar bloqueio</button>
        </div>
      </form>
    </section>

    <section class="blocks-card">
      <h2>Bloqueios cadastrados</h2>
      <div id="blocks-empty" class="empty-state" style="display:none">Nenhum bloqueio cadastrado.</div>
      <table class="blocks-table" id="blocks-table" style="display:none">
        <thead>
          <tr>
            <th>Atração</th>
            <th>Região</th>
            <th>Motivo</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="blocks-body"></tbody>
      </table>
    </section>
  </main>

  <script src="/blocks.js"></script>
</body>
</html>
