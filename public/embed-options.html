<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Embed do Player</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .embed-options-page {
      max-width: 980px;
      margin: 40px auto;
      padding: 0 20px 40px;
    }

    .embed-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .field label {
      font-size: 0.9rem;
      color: #d9dde4;
    }

    .field input,
    .field textarea {
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 10px;
      color: #fff;
      padding: 10px 12px;
      font: inherit;
      width: 100%;
    }

    .field textarea {
      min-height: 120px;
      resize: vertical;
    }

    .btn-primary {
      appearance: none;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      background: #ffca28;
      color: #1a1a1a;
      margin-right: 8px;
    }

    .muted {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.9rem;
      margin: 0 0 14px;
    }
  </style>
</head>
<body>
  <main class="embed-options-page">
    <section class="embed-card">
      <h1 id="embed-title">Embed do Player</h1>
      <p class="muted" id="embed-subtitle">Use a URL e o snippet abaixo para incorporar o player em outros sites mantendo Cast, bloqueio regional e analytics.</p>

      <div class="field">
        <label for="embed-url" id="embed-url-label">URL do player embed</label>
        <input id="embed-url" readonly />
      </div>

      <div class="field">
        <label for="embed-code" id="embed-code-label">Codigo iframe</label>
        <textarea id="embed-code" readonly></textarea>
      </div>

      <button type="button" class="btn-primary" id="btn-copy-url">Copiar URL</button>
      <button type="button" class="btn-primary" id="btn-copy-code">Copiar iframe</button>
    </section>
  </main>

  <script src="/embed-options.js"></script>
</body>
</html>
