<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administração</title>
  <link rel="icon" href="/webtvframework.ico" />
  <link rel="stylesheet" href="/admin.css" />
</head>
<body>
  <main class="admin-shell" id="admin-shell">
    <aside class="admin-sidebar">
      <div class="brand-wrap">
        <img id="admin-brand-icon" class="admin-brand-icon" src="/webtvframework.ico" alt="Icone do webtvframework" />
        <p class="brand-kicker" id="admin-kicker">Painel administrativo</p>
        <h1 id="channel-name">Webtv framework</h1>
      </div>

      <nav class="admin-menu" aria-label="Menu da administração">
        <button type="button" class="menu-item is-active" data-view="blocks" id="menu-blocks">Bloqueio de Regiao</button>
        <button type="button" class="menu-item" data-view="channelBlocks" id="menu-channel-blocks">Bloqueio de Canal</button>
        <button type="button" class="menu-item" data-view="stats" id="menu-stats">Estatisticas</button>
        <button type="button" class="menu-item" data-view="settings" id="menu-settings">Configuracoes Gerais</button>
        <button type="button" class="menu-item" data-view="personalization" id="menu-personalization">Personalizacao da Home</button>
        <button type="button" class="menu-item" data-view="embed" id="menu-embed">Embed</button>
      </nav>

      <div id="update-section" class="update-section" style="display:none">
        <p id="update-available-label" class="update-available-label"></p>
        <button type="button" id="btn-update" class="btn-update">Atualizar</button>
      </div>

      <button type="button" id="btn-logout" class="btn-logout" style="display:none">Sair</button>
    </aside>

    <section class="admin-content">
      <header class="content-head">
        <h2 id="view-title">Bloqueio de Regiao</h2>
      </header>

      <div class="iframe-wrap">
        <iframe id="admin-frame" title="Conteudo da administracao" loading="eager"></iframe>
      </div>
    </section>
  </main>

  <div class="auth-overlay" id="auth-overlay" style="display:none">
    <form id="auth-form" class="auth-card">
      <h3 id="auth-title">Acesso administrativo</h3>
      <p id="auth-subtitle">Informe a senha para acessar a administracao.</p>
      <label for="admin-password" id="auth-password-label">Senha</label>
      <input id="admin-password" name="password" type="password" autocomplete="current-password" required />
      <button type="submit" id="auth-submit">Entrar</button>
      <p id="auth-error" class="auth-error" style="display:none"></p>
    </form>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
